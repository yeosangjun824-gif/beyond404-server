spring:
  application:
    name: swapit
  datasource:
    url: jdbc:h2:mem:swapit;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

google:
  maps:
    server-api-key: ${GOOGLE_MAPS_SERVER_API_KEY:${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:}}


